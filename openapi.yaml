openapi: 3.0.3
info:
  title: TCSS 460 Team 6 API
  description: |
    **Team:** Group 6
    **Deployed URL:** https://your-deployed-url-here.example.com

    A RESTful API for the TCSS 460 group project.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://your-deployed-url-here.example.com
    description: Deployed production server

tags:
  - name: General
    description: General-purpose routes

paths:
  /hello:
    get:
      tags: [General]
      summary: Hello
      description: Returns a greeting message.
      responses:
        '200':
          description: A greeting message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Hello, TCSS 460!'
  /health:
    get:
      tags: [General]
      summary: Health check
      description: Returns the service health status.
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
